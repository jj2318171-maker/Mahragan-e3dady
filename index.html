<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مهرجان الكرازة - ليأتِ ملكوتك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --c1: #ff6b6b;
  --c2: #ffd93d;
  --c3: #6bcb77;
  --c4: #4d96ff;
  --c5: #ff922b;
  --c6: #cc5de8;
  --bg: #0f0c1d;
  --bg2: #16112b;
  --bg3: #1d1535;
  --surface: rgba(255,255,255,0.055);
  --surface-hover: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.1);
  --text: #f8f5ff;
  --muted: rgba(248,245,255,0.55);
  --radius: 20px;
  --radius-sm: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Animated gradient background ─── */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
  animation: drift 18s ease-in-out infinite alternate;
}
.orb-1 { width: 600px; height: 600px; background: var(--c4); top: -200px; right: -150px; animation-duration: 20s; }
.orb-2 { width: 500px; height: 500px; background: var(--c6); bottom: -200px; left: -100px; animation-duration: 25s; animation-delay: -8s; }
.orb-3 { width: 400px; height: 400px; background: var(--c1); top: 40%; left: 30%; animation-duration: 22s; animation-delay: -4s; }
.orb-4 { width: 350px; height: 350px; background: var(--c2); top: 60%; right: 10%; animation-duration: 16s; animation-delay: -12s; }

@keyframes drift {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, 60px) scale(1.15); }
}

/* ─── Floating particles ─── */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.dot {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  10% { opacity: 0.7; }
  90% { opacity: 0.5; }
  100% { opacity: 0; transform: translateY(-100vh) scale(1.2); }
}

/* ─── Layout ─── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── Top header strip ─── */
.header-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px 20px;
  background: linear-gradient(90deg, rgba(77,150,255,0.15), rgba(204,93,232,0.15));
  border-bottom: 1px solid rgba(255,255,255,0.07);
  font-size: 13px;
  color: var(--muted);
  letter-spacing: .04em;
}
.header-strip .cross { color: var(--c2); font-size: 15px; }

/* ─── Main layout grid ─── */
.main-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr 280px;
  gap: 24px;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
  padding: 28px 24px 100px;
  align-items: start;
}

/* ─── Center hero ─── */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Logo ring */
.logo-ring {
  position: relative;
  width: 96px;
  height: 96px;
  margin-bottom: 20px;
}
.logo-ring img {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  object-fit: cover;
  position: relative;
  z-index: 2;
}
.logo-ring::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(var(--c4), var(--c6), var(--c1), var(--c2), var(--c4));
  animation: spin 4s linear infinite;
  z-index: 1;
}
.logo-ring::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: var(--bg);
  z-index: 1;
  margin: 3px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Festival badge */
.festival-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, rgba(255,146,43,0.2), rgba(255,217,61,0.2));
  border: 1px solid rgba(255,217,61,0.35);
  border-radius: 99px;
  padding: 6px 18px;
  font-size: 12px;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  color: var(--c2);
  letter-spacing: .08em;
  margin-bottom: 18px;
  animation: pulse-badge 2.5s ease-in-out infinite;
}
@keyframes pulse-badge {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,217,61,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(255,217,61,0); }
}

/* Big headline */
.hero-title {
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: clamp(26px, 5vw, 42px);
  line-height: 1.2;
  text-align: center;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 20%, var(--c4) 50%, var(--c6) 80%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.hero-sub {
  font-size: 14px;
  color: var(--muted);
  text-align: center;
  line-height: 1.8;
  margin-bottom: 28px;
}
.hero-sub strong {
  color: rgba(255,255,255,0.8);
  font-weight: 600;
}

/* ─── Search card ─── */
.search-card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}
.search-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--c4), var(--c6), var(--c1));
  border-radius: var(--radius) var(--radius) 0 0;
}

.search-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.search-label .icon { font-size: 16px; }

.input-wrap { position: relative; margin-bottom: 14px; }

input[type="text"] {
  width: 100%;
  padding: 16px 48px 16px 18px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  letter-spacing: .1em;
  outline: none;
  transition: all .2s;
}
input[type="text"]::placeholder {
  color: rgba(255,255,255,0.25);
  font-weight: 400;
  letter-spacing: 0;
  font-size: 15px;
}
input[type="text"]:focus {
  border-color: var(--c4);
  background: rgba(77,150,255,0.08);
  box-shadow: 0 0 0 4px rgba(77,150,255,0.15);
}
.input-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  opacity: .5;
  pointer-events: none;
}

/* ─── Search button ─── */
.btn-search {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--c4) 0%, var(--c6) 100%);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-weight: 800;
  font-size: 17px;
  cursor: pointer;
  letter-spacing: .05em;
  position: relative;
  overflow: hidden;
  transition: all .2s;
  box-shadow: 0 8px 28px -8px rgba(77,150,255,0.55);
}
.btn-search::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity .2s;
}
.btn-search:hover { transform: translateY(-2px); box-shadow: 0 12px 36px -8px rgba(77,150,255,0.7); }
.btn-search:hover::before { opacity: 1; }
.btn-search:active { transform: scale(.98); }

/* ─── Result area ─── */
#result { margin-top: 20px; width: 100%; }

.msg {
  text-align: center;
  padding: 16px;
  color: var(--muted);
  font-size: 14px;
  animation: fadein .3s ease;
}
.msg.error { color: #ff8787; }

/* ─── Result card ─── */
.result-card {
  background: linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 20px 22px;
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: cardPop .4s cubic-bezier(.2,.8,.2,1) both;
}
.result-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--rc-glow, rgba(77,150,255,0.2)) 0%, transparent 65%);
  pointer-events: none;
}
@keyframes cardPop {
  from { opacity: 0; transform: translateY(20px) scale(.95); }
  to { opacity: 1; transform: none; }
}

.result-rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  font-size: 32px;
  margin-bottom: 16px;
  background: var(--rc-bg, linear-gradient(135deg, var(--c4), var(--c6)));
  box-shadow: 0 12px 32px -10px var(--rc-shadow, rgba(77,150,255,0.6));
  position: relative;
  z-index: 1;
}

.result-name {
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: 22px;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}

.result-score-big {
  position: relative;
  z-index: 1;
  margin-bottom: 20px;
}
.result-score-big .label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  margin-bottom: 4px;
}
.result-score-big .value {
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: 48px;
  background: linear-gradient(135deg, var(--c2), var(--c5));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1;
}

.result-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  position: relative;
  z-index: 1;
}
.result-stat {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
}
.result-stat .s-label {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
  letter-spacing: .04em;
}
.result-stat .s-value {
  font-family: 'Cairo', sans-serif;
  font-weight: 800;
  font-size: 16px;
  color: #fff;
}

/* ─── Side panels ─── */
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ─── Collapsible section ─── */
.collapsible {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}

.collapsible-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--surface);
  border: none;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: background .2s;
  text-align: right;
}
.collapsible-btn:hover { background: var(--surface-hover); }
.collapsible-btn .btn-label { display: flex; align-items: center; gap: 8px; }
.collapsible-btn .arrow {
  font-size: 11px;
  color: var(--muted);
  transition: transform .3s;
  display: inline-block;
}
.collapsible-btn.is-open .arrow { transform: rotate(180deg); }

.collapsible-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .38s cubic-bezier(.2,.8,.2,1);
  background: rgba(0,0,0,0.15);
}
.collapsible-body.is-open { max-height: 600px; }
.collapsible-inner { padding: 10px 12px 14px; display: flex; flex-direction: column; gap: 7px; }

/* ─── Leaderboard row ─── */
.lb-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  transition: background .2s;
  animation: fadein .3s ease both;
}
.lb-row:hover { background: rgba(255,255,255,0.08); }

.lb-num {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: 12px;
  color: var(--bg);
  background: linear-gradient(135deg, #c9b8ff, #8c6bf5);
}
.lb-row.p1 .lb-num { background: linear-gradient(135deg, #fff8b0, #ffd700); }
.lb-row.p2 .lb-num { background: linear-gradient(135deg, #eaeaea, #aaa); }
.lb-row.p3 .lb-num { background: linear-gradient(135deg, #f8d09a, #cd7f32); }

.lb-name {
  flex: 1;
  font-family: 'Cairo', sans-serif;
  font-weight: 600;
  font-size: 13px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.lb-score {
  font-family: 'Cairo', sans-serif;
  font-weight: 800;
  font-size: 14px;
  color: var(--c2);
  flex-shrink: 0;
}

/* ─── Tasks ─── */
.tasks-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.tasks-head {
  padding: 13px 18px;
  font-family: 'Cairo', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: .04em;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, rgba(107,203,119,0.12), rgba(77,150,255,0.08));
}
.tasks-list { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px; }

.task-item {
  display: block;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-family: 'Cairo', sans-serif;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.07);
  transition: all .2s;
  animation: fadein .3s ease both;
}
.task-item.no-link {
  color: var(--muted);
  background: rgba(255,255,255,0.03);
  cursor: default;
}
a.task-item {
  color: #fff;
  background: linear-gradient(135deg, rgba(107,203,119,0.2), rgba(77,150,255,0.15));
  border-color: rgba(107,203,119,0.3);
}
a.task-item:hover {
  background: linear-gradient(135deg, rgba(107,203,119,0.35), rgba(77,150,255,0.25));
  transform: translateX(-3px);
  border-color: rgba(107,203,119,0.6);
}

/* ─── Images ─── */
.side-img {
  border-radius: var(--radius);
  width: 100%;
  display: block;
  border: 1px solid var(--border);
  object-fit: cover;
}

/* ─── Footer ─── */
footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  text-align: center;
  padding: 10px 20px 14px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  background: linear-gradient(to top, rgba(15,12,29,0.98) 70%, transparent);
  pointer-events: none;
}

/* ─── Utility ─── */
@keyframes fadein {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}

/* ─── MOBILE ─── */
@media (max-width: 900px) {
  .main-grid {
    grid-template-columns: 1fr;
    padding: 16px 14px 90px;
    gap: 16px;
  }
  .col-right { order: 2; }
  .col-center { order: 1; }
  .col-left { order: 3; }

  .hero-title { font-size: clamp(22px, 7vw, 32px); }
  .result-score-big .value { font-size: 40px; }
  .result-stats { grid-template-columns: 1fr 1fr 1fr; }
}

@media (max-width: 480px) {
  .header-strip { font-size: 11px; padding: 10px 12px; }
  .logo-ring { width: 78px; height: 78px; }
  .logo-ring img { width: 78px; height: 78px; }
  .logo-ring::before { inset: -3px; }
}

/* loading spinner */
.spinner {
  width: 30px; height: 30px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--c4);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 20px auto;
}
</style>
</head>
<body>

<!-- BG -->
<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<div class="particles" id="particles" aria-hidden="true"></div>

<div class="page">

  <div class="header-strip">
    <span class="cross">✝</span>
    خدمة فتيان اعدادي — كنيسة الشهيد العظيم مارمينا — مطرانية الأقباط الأرثوذكس بالفيوم
    <span class="cross">✝</span>
  </div>

  <div class="main-grid">

    <!-- ── RIGHT: Leaderboard + Tasks ── -->
    <div class="side-panel col-right">

      <div class="collapsible">
        <button class="collapsible-btn" onclick="toggleSection(this,'topPanel')" aria-expanded="false">
          <span class="btn-label">🏆 <span>TOP 10</span></span>
          <span class="arrow">▾</span>
        </button>
        <div class="collapsible-body" id="topPanel">
          <div class="collapsible-inner" id="topTenList">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <div class="collapsible">
        <button class="collapsible-btn" onclick="toggleSection(this,'groupsPanel')" aria-expanded="false">
          <span class="btn-label">🏅 <span>ترتيب المجموعات</span></span>
          <span class="arrow">▾</span>
        </button>
        <div class="collapsible-body" id="groupsPanel">
          <div class="collapsible-inner" id="groupsList">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <div class="tasks-box">
        <div class="tasks-head">⚡ Tasks</div>
        <div class="tasks-list" id="tasksList">
          <div class="spinner"></div>
        </div>
      </div>

    </div>

    <!-- ── CENTER: Hero + Search ── -->
    <div class="hero col-center">

      <div class="logo-ring">
        <img src="logo.jpg" alt="شعار الخدمة" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2296%22 height=%2296%22%3E%3Ccircle cx=%2248%22 cy=%2248%22 r=%2248%22 fill=%22%231d1535%22/%3E%3Ctext x=%2248%22 y=%2254%22 text-anchor=%22middle%22 fill=%22%234d96ff%22 font-size=%2228%22%3E✝%3C/text%3E%3C/svg%3E'">
      </div>

      <div class="festival-badge">✦ مهرجان ليأتِ ملكوتك ✦</div>

      <h1 class="hero-title">اعرف سكورك وترتيبك<br>بين سكان الملكوت</h1>
      <p class="hero-sub">أدخل الكود الخاص بك وشوف مكانك<br><strong>مهرجان الكرازة 2026</strong></p>

      <div class="search-card">
        <div class="search-label"><span class="icon">🔑</span> الكود الخاص بك</div>
        <div class="input-wrap">
          <span class="input-icon">#</span>
          <input type="text" id="codeInput" placeholder="اكتب الكود هنا" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter') searchStudent()">
        </div>
        <button class="btn-search" onclick="searchStudent()">🔍 بحث</button>
        <div id="result"></div>
      </div>

    </div>

    <!-- ── LEFT: Images ── -->
    <div class="side-panel col-left">
      <img class="side-img" src="side-image.jpg" alt="صورة المهرجان"
        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22560%22%3E%3Crect width=%22400%22 height=%22560%22 rx=%2220%22 fill=%22%231d1535%22 stroke=%22%234d96ff%22 stroke-width=%222%22 stroke-dasharray=%228 6%22/%3E%3Ctext x=%22200%22 y=%22280%22 text-anchor=%22middle%22 fill=%22%234d96ff%22 font-family=%22Tajawal%22 font-size=%2218%22%3Eصورة المهرجان%3C/text%3E%3C/svg%3E'">
      <img class="side-img" src="extra-photo.jpg" alt="صورة إضافية"
        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect width=%22400%22 height=%22300%22 rx=%2220%22 fill=%22%231d1535%22 stroke=%22%23cc5de8%22 stroke-width=%222%22 stroke-dasharray=%228 6%22/%3E%3Ctext x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%23cc5de8%22 font-family=%22Tajawal%22 font-size=%2218%22%3Eصورة إضافية%3C/text%3E%3C/svg%3E'">
    </div>

  </div>

</div>

<footer>✝ خدمة فتيان اعدادي — 2026 ✝</footer>

<script>
/* ── Particles ── */
const pLayer = document.getElementById('particles');
const colors = ['#4d96ff','#cc5de8','#ff6b6b','#ffd93d','#6bcb77','#ff922b'];
for(let i = 0; i < 35; i++){
  const d = document.createElement('div');
  d.className = 'dot';
  const sz = Math.random() * 5 + 3;
  d.style.cssText = `
    width:${sz}px; height:${sz}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    animation-duration:${Math.random()*18+10}s;
    animation-delay:${Math.random()*12}s;
    filter:blur(0.5px);
  `;
  pLayer.appendChild(d);
}

/* ── Toggle collapsible ── */
function toggleSection(btn, panelId){
  const body = document.getElementById(panelId);
  const isOpen = body.classList.toggle('is-open');
  btn.classList.toggle('is-open', isOpen);
  btn.setAttribute('aria-expanded', isOpen);
}

/* ── CSV helpers ── */
function parseCsvRow(row){
  const cells = []; let cur = '', inQ = false;
  for(let i = 0; i < row.length; i++){
    const ch = row[i];
    if(ch === '"'){ if(inQ && row[i+1]==='"'){ cur+='"'; i++; } else inQ=!inQ; }
    else if(ch===',' && !inQ){ cells.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  cells.push(cur.trim()); return cells;
}
function parseCsv(txt){
  return txt.split(/\r?\n/).filter(r=>r.trim()).slice(1).map(parseCsvRow);
}

/* ── Sheet URLs ── */
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHajA3Sh7fhy0DHQJcfncs4jFIw60j5kwVJdUK4Kboq-s1l20lpzmUy28r-8zWdXf-iCSzd7Mwshqc/pub?output=csv";
const groupsURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQw3w3rB6jBD_jPsDyQ9cd8RKPwgp6f20nYB5uPZTkljgio7ImT31NQBlLV9FfvLn_IPsVhYZsQ22X1/pub?gid=0&single=true&output=csv";
const tasksURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRy9PMzsM33JHylM-lTFX7ALV1IoLrvBNeedC5RITH6z2iK97j3CnoGXU0EUyuntQCDL9BIGeG1lTgP/pub?output=csv";

/* ── Rank visuals ── */
function rankVis(rank){
  const r = parseInt(rank,10);
  if(r===1) return { icon:'🥇', bg:'linear-gradient(135deg,#fff8b0,#ffd700)', shadow:'rgba(255,215,0,0.6)', glow:'rgba(255,215,0,0.25)' };
  if(r===2) return { icon:'🥈', bg:'linear-gradient(135deg,#eaeaea,#bbb)', shadow:'rgba(192,192,192,0.55)', glow:'rgba(192,192,192,0.2)' };
  if(r===3) return { icon:'🥉', bg:'linear-gradient(135deg,#f8d09a,#cd7f32)', shadow:'rgba(205,127,50,0.55)', glow:'rgba(205,127,50,0.2)' };
  return { icon:'🎓', bg:'linear-gradient(135deg,#a5c8ff,#4d96ff)', shadow:'rgba(77,150,255,0.55)', glow:'rgba(77,150,255,0.2)' };
}

/* ── Search ── */
async function searchStudent(){
  const code = document.getElementById('codeInput').value.trim();
  const res = document.getElementById('result');
  if(!code){ res.innerHTML='<div class="msg">اكتب الكود الخاص بك أولاً 👆</div>'; return; }
  res.innerHTML = '<div class="spinner"></div>';
  try{
    const r = await fetch(sheetURL);
    const students = parseCsv(await r.text());
    const s = students.find(s=>s[0]===code);
    if(s){
      const v = rankVis(s[5]);
      res.innerHTML = `
        <div class="result-card" style="--rc-glow:${v.glow};">
          <div class="result-rank-badge" style="background:${v.bg};box-shadow:0 12px 32px -10px ${v.shadow};">${v.icon}</div>
          <div class="result-name">${s[1]}</div>
          <div class="result-score-big">
            <div class="label">إجمالي السكور</div>
            <div class="value">${s[2]}</div>
          </div>
          <div class="result-stats">
            <div class="result-stat"><div class="s-label">الفصل</div><div class="s-value">${s[3]}</div></div>
            <div class="result-stat"><div class="s-label">المجموعة</div><div class="s-value">${s[4]}</div></div>
            <div class="result-stat"><div class="s-label">الترتيب</div><div class="s-value">${s[5]}</div></div>
          </div>
        </div>`;
    } else {
      res.innerHTML = '<div class="msg error">❌ مش لاقي الكود ده، تأكد من الأرقام وحاول تاني</div>';
    }
  } catch(e){
    res.innerHTML = '<div class="msg error">⚠️ في مشكلة في الاتصال، حاول بعد شوية</div>';
  }
}

/* ── TOP 10 ── */
async function loadTop10(){
  const el = document.getElementById('topTenList');
  try{
    const r = await fetch(sheetURL);
    const rows = parseCsv(await r.text())
      .filter(s=>s[1]&&s[1].trim())
      .sort((a,b)=>(parseFloat(b[2])||0)-(parseFloat(a[2])||0))
      .slice(0,10);
    if(!rows.length){ el.innerHTML='<div class="msg">لا توجد بيانات</div>'; return; }
    el.innerHTML = rows.map((s,i)=>{
      const p = i+1;
      const pc = p<=3?`p${p}`:'';
      return `<div class="lb-row ${pc}" style="animation-delay:${i*0.05}s">
        <div class="lb-num">${p}</div>
        <div class="lb-name">${s[1]}</div>
        <div class="lb-score">${s[2]}</div>
      </div>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="msg error">تعذر التحميل</div>';
  }
}

/* ── Groups ── */
async function loadGroups(){
  const el = document.getElementById('groupsList');
  try{
    const r = await fetch(groupsURL);
    const txt = await r.text();
    const rows = txt.split(/\r?\n/).filter(r=>r.trim()).slice(1).map(parseCsvRow)
      .filter(r=>r[0]&&r[0].trim())
      .sort((a,b)=>(parseFloat(b[1])||0)-(parseFloat(a[1])||0));
    if(!rows.length){ el.innerHTML='<div class="msg">لا توجد بيانات</div>'; return; }
    el.innerHTML = rows.map((g,i)=>{
      const p = i+1;
      const pc = p<=3?`p${p}`:'';
      return `<div class="lb-row ${pc}" style="animation-delay:${i*0.05}s">
        <div class="lb-num">${p}</div>
        <div class="lb-name">${g[0]}</div>
        <div class="lb-score">${g[1]}</div>
      </div>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="msg error">تعذر التحميل</div>';
  }
}

/* ── Tasks ── */
async function loadTasks(){
  const el = document.getElementById('tasksList');
  try{
    const r = await fetch(tasksURL);
    const txt = await r.text();
    const tasks = txt.split(/\r?\n/).filter(r=>r.trim()).slice(1).map(parseCsvRow)
      .filter(r=>r[0]&&r[0].trim()).slice(0,3);
    if(!tasks.length){ el.innerHTML='<div class="msg">لا توجد مهام</div>'; return; }
    el.innerHTML = tasks.map((t,i)=>{
      const n=t[0]||'', lk=t[1]||'';
      return lk
        ? `<a class="task-item" href="${lk}" target="_blank" rel="noopener" style="animation-delay:${i*0.07}s">→ ${n}</a>`
        : `<div class="task-item no-link" style="animation-delay:${i*0.07}s">${n}</div>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="msg error">تعذر التحميل</div>';
  }
}

loadTop10();
loadGroups();
loadTasks();
</script>
</body>
</html>
