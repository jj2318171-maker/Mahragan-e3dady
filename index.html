<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مهرجان الكرازة - ليأتِ ملكوتك</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Candy / game-console palette ── */
  --pink: #ff3d8e;
  --pink-deep: #d81b6b;
  --yellow: #ffd400;
  --green: #00d9a3;
  --blue: #2fc6ff;
  --orange: #ff8a3d;
  --violet: #7b3fe4;

  --bg1: #3a0d73;
  --bg2: #6c1fb0;
  --bg3: #a11f8f;

  --ink: #1f1235;
  --ink-soft: rgba(31,18,53,0.62);
  --paper: #ffffff;
  --paper-tint: #f6f0ff;

  --radius: 26px;
  --radius-sm: 16px;
  --border-w: 3px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(150deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Animated blobs ─── */
.bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.55; animation: drift 18s ease-in-out infinite alternate; mix-blend-mode: screen; }
.orb-1 { width: 560px; height: 560px; background: var(--pink); top: -220px; right: -160px; animation-duration: 20s; }
.orb-2 { width: 460px; height: 460px; background: var(--blue); bottom: -180px; left: -120px; animation-duration: 25s; animation-delay: -8s; }
.orb-3 { width: 380px; height: 380px; background: var(--yellow); top: 42%; left: 32%; opacity: 0.28; animation-duration: 22s; animation-delay: -4s; }
.orb-4 { width: 340px; height: 340px; background: var(--green); top: 62%; right: 8%; opacity: 0.32; animation-duration: 16s; animation-delay: -12s; }

@keyframes drift {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, 60px) scale(1.18); }
}

/* ─── Confetti particles ─── */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.dot { position: absolute; opacity: 0; animation: floatUp linear infinite; }
.dot.sq { border-radius: 4px; }
.dot.ci { border-radius: 50%; }
@keyframes floatUp {
  0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.6); }
  10% { opacity: 0.85; }
  90% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-100vh) rotate(360deg) scale(1.15); }
}

/* ─── Layout ─── */
.page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

/* ─── Top ribbon ─── */
.header-strip {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 11px 20px;
  background: repeating-linear-gradient(90deg, var(--yellow) 0 26px, var(--pink) 26px 52px);
  border-bottom: var(--border-w) solid var(--ink);
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: .02em;
}
.header-strip span.chip {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 99px;
  padding: 3px 14px;
}

/* ─── Main layout grid ─── */
.main-grid {
  flex: 1; display: grid;
  grid-template-columns: 280px 1fr 280px;
  gap: 22px;
  max-width: 1280px; margin: 0 auto; width: 100%;
  padding: 30px 22px 110px;
  align-items: start;
}

/* ─── Center hero ─── */
.hero { display: flex; flex-direction: column; align-items: center; gap: 0; }

/* Logo ring */
.logo-ring { position: relative; width: 102px; height: 102px; margin-bottom: 18px; }
.logo-ring img { width: 102px; height: 102px; border-radius: 50%; object-fit: cover; position: relative; z-index: 2; border: var(--border-w) solid var(--ink); }
.logo-ring::before {
  content: ''; position: absolute; inset: -7px; border-radius: 50%;
  background: conic-gradient(var(--pink), var(--yellow), var(--green), var(--blue), var(--pink));
  animation: spin 5s linear infinite; z-index: 1;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Festival badge — sticker */
.festival-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--yellow);
  border: var(--border-w) solid var(--ink);
  border-radius: 99px;
  padding: 8px 24px;
  font-size: 13px;
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: .02em;
  margin-bottom: 18px;
  box-shadow: 4px 4px 0 var(--ink);
  animation: wiggle 3.2s ease-in-out infinite;
}
@keyframes wiggle {
  0%, 100% { transform: rotate(-1.5deg); }
  50% { transform: rotate(1.5deg); }
}

/* Big headline */
.hero-title {
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-weight: 800;
  font-size: clamp(26px, 5vw, 42px);
  line-height: 1.25;
  text-align: center;
  margin-bottom: 10px;
  color: var(--paper);
  text-shadow: 3px 3px 0 var(--ink), -1px -1px 0 var(--ink);
}
.hero-title .hi { color: var(--yellow); }

.hero-church {
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.85);
  text-align: center; letter-spacing: .02em;
  margin-bottom: 8px;
}

.hero-sub {
  font-size: 14px; color: rgba(255,255,255,0.9);
  text-align: center; line-height: 1.9; margin-bottom: 26px;
}
.hero-sub strong {
  color: var(--yellow); font-weight: 800;
  font-family: 'Baloo Bhaijaan 2', sans-serif;
}

/* ─── Search card (the signature sticker panel) ─── */
.search-card {
  width: 100%;
  background: var(--paper);
  border: var(--border-w) solid var(--ink);
  border-radius: var(--radius);
  padding: 26px 22px;
  position: relative;
  box-shadow: 8px 8px 0 var(--ink);
  transition: transform .15s, box-shadow .15s;
}
.search-card::before {
  content: '🔑';
  position: absolute;
  top: -22px; right: 22px;
  width: 46px; height: 46px;
  background: var(--pink);
  border: var(--border-w) solid var(--ink);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 3px 3px 0 var(--ink);
  transform: rotate(-8deg);
}

.search-label {
  font-size: 14px; font-weight: 700;
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  color: var(--ink);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}

.input-wrap { position: relative; margin-bottom: 14px; }

input[type="text"] {
  width: 100%;
  padding: 17px 48px 17px 18px;
  background: var(--paper-tint);
  border: var(--border-w) solid var(--ink);
  border-radius: var(--radius-sm);
  color: var(--ink);
  font-family: 'Cairo', sans-serif;
  font-size: 19px; font-weight: 800;
  text-align: center; letter-spacing: .1em;
  outline: none;
  transition: all .2s;
}
input[type="text"]::placeholder {
  color: rgba(31,18,53,0.35); font-weight: 500; letter-spacing: 0; font-size: 15px;
}
input[type="text"]:focus {
  background: #fff;
  box-shadow: 0 0 0 4px rgba(123,63,228,0.25);
}
.input-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 20px; opacity: .55; pointer-events: none; }

/* ─── Search button ─── */
.btn-search {
  width: 100%;
  padding: 17px;
  background: var(--green);
  border: var(--border-w) solid var(--ink);
  border-radius: var(--radius-sm);
  color: var(--ink);
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-weight: 700;
  font-size: 18px;
  cursor: pointer;
  letter-spacing: .02em;
  box-shadow: 5px 5px 0 var(--ink);
  transition: transform .12s, box-shadow .12s;
}
.btn-search:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
.btn-search:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }

/* ─── Result area ─── */
#result { margin-top: 20px; width: 100%; }

.msg {
  text-align: center; padding: 16px;
  color: rgba(255,255,255,0.85);
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-weight: 600;
  font-size: 14px;
  animation: fadein .3s ease;
}
.msg.error { color: var(--yellow); }

/* ─── Result card (badge reveal) ─── */
.result-card {
  background: var(--paper-tint);
  border: var(--border-w) solid var(--ink);
  border-radius: var(--radius);
  padding: 30px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 7px 7px 0 var(--ink);
  animation: cardPop .45s cubic-bezier(.2,.8,.2,1) both;
}
.result-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--rc-glow, rgba(123,63,228,0.18)) 0%, transparent 65%);
  pointer-events: none;
}
@keyframes cardPop {
  0% { opacity: 0; transform: translateY(20px) scale(.9) rotate(-2deg); }
  60% { transform: translateY(-4px) scale(1.02) rotate(1deg); }
  100% { opacity: 1; transform: none; }
}

.result-rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 78px; height: 78px;
  border: var(--border-w) solid var(--ink);
  border-radius: 50%;
  font-size: 34px;
  margin-bottom: 16px;
  box-shadow: 4px 4px 0 var(--ink);
  position: relative; z-index: 1;
}

.result-name {
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-weight: 800; font-size: 23px;
  margin-bottom: 20px; color: var(--ink);
  position: relative; z-index: 1;
}

.result-score-big { position: relative; z-index: 1; margin-bottom: 20px; }
.result-score-big .label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .12em; color: var(--ink-soft); margin-bottom: 4px;
}
.result-score-big .value {
  font-family: 'Cairo', sans-serif; font-weight: 900; font-size: 50px;
  color: var(--pink-deep);
  -webkit-text-stroke: 1.5px var(--ink);
  line-height: 1;
}

.result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; position: relative; z-index: 1; }
.result-stat {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
}
.result-stat .s-label { font-size: 11px; color: var(--ink-soft); margin-bottom: 5px; letter-spacing: .03em; font-weight: 600; }
.result-stat .s-value { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 16px; color: var(--ink); }

/* ─── Side panels ─── */
.side-panel { display: flex; flex-direction: column; gap: 16px; }

/* ─── Collapsible section ─── */
.collapsible {
  border-radius: var(--radius);
  overflow: hidden;
  border: var(--border-w) solid var(--ink);
  background: var(--paper);
  box-shadow: 6px 6px 0 var(--ink);
}

.collapsible-btn {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 18px;
  background: var(--blue);
  border: none; border-bottom: var(--border-w) solid transparent;
  color: var(--ink);
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-weight: 700; font-size: 15px;
  cursor: pointer;
  transition: filter .2s;
  text-align: right;
}
.collapsible-btn:hover { filter: brightness(1.06); }
.collapsible-btn.is-open { border-bottom-color: var(--ink); }
.collapsible-btn .btn-label { display: flex; align-items: center; gap: 8px; }
.collapsible-btn .arrow {
  font-size: 14px; color: var(--ink); font-weight: 900;
  transition: transform .3s; display: inline-block;
}
.collapsible-btn.is-open .arrow { transform: rotate(180deg); }

.collapsible-body {
  max-height: 0; overflow: hidden;
  transition: max-height .38s cubic-bezier(.2,.8,.2,1);
  background: var(--paper-tint);
}
.collapsible-body.is-open { max-height: 600px; }
.collapsible-inner { padding: 12px 12px 14px; display: flex; flex-direction: column; gap: 8px; }

/* ─── Leaderboard row ─── */
.lb-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--paper);
  border: 2px solid var(--ink);
  transition: transform .15s;
  animation: fadein .3s ease both;
}
.lb-row:hover { transform: translateX(-3px); }

.lb-num {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cairo', sans-serif; font-weight: 900; font-size: 12px;
  color: var(--paper);
  background: var(--violet);
  border: 2px solid var(--ink);
}
.lb-row.p1 .lb-num { background: var(--yellow); color: var(--ink); }
.lb-row.p2 .lb-num { background: #d7d7e0; color: var(--ink); }
.lb-row.p3 .lb-num { background: var(--orange); color: var(--ink); }

.lb-name {
  flex: 1; font-family: 'Baloo Bhaijaan 2', sans-serif; font-weight: 600; font-size: 13px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink);
}
.lb-score { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14px; color: var(--pink-deep); flex-shrink: 0; }

/* ─── Tasks ─── */
.tasks-box {
  background: var(--paper);
  border: var(--border-w) solid var(--ink);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 6px 6px 0 var(--ink);
}
.tasks-head {
  padding: 14px 18px;
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-weight: 700; font-size: 15px; letter-spacing: .02em;
  border-bottom: var(--border-w) solid var(--ink);
  display: flex; align-items: center; gap: 8px;
  background: var(--green);
  color: var(--ink);
}
.tasks-list { padding: 12px 12px 14px; display: flex; flex-direction: column; gap: 9px; background: var(--paper-tint); }

.task-item {
  display: block;
  padding: 13px 16px;
  border-radius: var(--radius-sm);
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  font-weight: 600; font-size: 14px;
  text-decoration: none;
  border: 2px solid var(--ink);
  transition: all .15s;
  animation: fadein .3s ease both;
}
.task-item.no-link { color: var(--ink-soft); background: #eee7fb; cursor: default; }
a.task-item { color: var(--ink); background: var(--yellow); }
a.task-item:hover { transform: translate(-2px,-2px); box-shadow: 3px 3px 0 var(--ink); }

/* ─── Images ─── */
.side-img {
  border-radius: var(--radius);
  width: 100%; display: block;
  border: var(--border-w) solid var(--ink);
  object-fit: cover;
  box-shadow: 6px 6px 0 var(--ink);
}

/* ─── Footer ─── */
footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  text-align: center; padding: 10px 20px 14px;
  font-size: 12px; font-family: 'Baloo Bhaijaan 2', sans-serif; font-weight: 600;
  color: rgba(255,255,255,0.9);
  background: linear-gradient(to top, rgba(58,13,115,0.98) 70%, transparent);
  pointer-events: none;
  border-top: 2px solid rgba(255,255,255,0.15);
}

/* ─── Utility ─── */
@keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ─── MOBILE ─── */
@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; padding: 16px 14px 96px; gap: 16px; }
  .col-right { order: 2; }
  .col-center { order: 1; }
  .col-left { order: 3; }
  .hero-title { font-size: clamp(22px, 7vw, 32px); }
  .result-score-big .value { font-size: 42px; }
  .result-stats { grid-template-columns: 1fr 1fr 1fr; }
}

@media (max-width: 480px) {
  .header-strip { font-size: 11px; padding: 9px 12px; }
  .logo-ring { width: 82px; height: 82px; }
  .logo-ring img { width: 82px; height: 82px; }
}

/* loading spinner */
.spinner {
  width: 32px; height: 32px;
  border: 4px solid var(--paper-tint);
  border-top-color: var(--pink);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 20px auto;
}
</style>
</head>
<body>

<!-- BG -->
<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<div class="particles" id="particles" aria-hidden="true"></div>

<div class="page">

  <div class="header-strip">
    <span class="chip">✝ مهرجان الكرازة 2026 ✝</span>
  </div>

  <div class="main-grid">

    <!-- ── RIGHT: Leaderboard + Tasks ── -->
    <div class="side-panel col-right">

      <div class="collapsible">
        <button class="collapsible-btn" onclick="toggleSection(this,'topPanel')" aria-expanded="false">
          <span class="btn-label">🏆 <span>TOP 10</span></span>
          <span class="arrow">▾</span>
        </button>
        <div class="collapsible-body" id="topPanel">
          <div class="collapsible-inner" id="topTenList">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <div class="collapsible">
        <button class="collapsible-btn" onclick="toggleSection(this,'groupsPanel')" aria-expanded="false">
          <span class="btn-label">🏅 <span>ترتيب المجموعات</span></span>
          <span class="arrow">▾</span>
        </button>
        <div class="collapsible-body" id="groupsPanel">
          <div class="collapsible-inner" id="groupsList">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <div class="tasks-box">
        <div class="tasks-head">⚡ Tasks</div>
        <div class="tasks-list" id="tasksList">
          <div class="spinner"></div>
        </div>
      </div>

    </div>

    <!-- ── CENTER: Hero + Search ── -->
    <div class="hero col-center">

      <div class="logo-ring">
        <img src="logo.jpg" alt="شعار الخدمة" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22102%22 height=%22102%22%3E%3Ccircle cx=%2251%22 cy=%2251%22 r=%2251%22 fill=%22%23f6f0ff%22/%3E%3Ctext x=%2251%22 y=%2260%22 text-anchor=%22middle%22 fill=%22%23ff3d8e%22 font-size=%2232%22%3E✝%3C/text%3E%3C/svg%3E'">
      </div>

      <div class="festival-badge">مهرجان ليأتِ ملكوتك</div>

      <h1 class="hero-title">اعرف سكورك <span class="hi">وترتيبك</span><br>بين سكان الملكوت</h1>
      <p class="hero-church">خدمة فتيان اعدادي — كنيسة الشهيد العظيم مارمينا — مطرانية الأقباط الأرثوذكس بالفيوم</p>
      <p class="hero-sub">أدخل الكود الخاص بك وشوف مكانك<br><strong>مهرجان الكرازة 2026</strong></p>

      <div class="search-card">
        <div class="search-label"><span class="icon"></span> الكود الخاص بك</div>
        <div class="input-wrap">
          <span class="input-icon">#</span>
          <input type="text" id="codeInput" placeholder="اكتب الكود هنا" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter') searchStudent()">
        </div>
        <button class="btn-search" onclick="searchStudent()">🔍 بحث</button>
        <div id="result"></div>
      </div>

    </div>

    <!-- ── LEFT: Images ── -->
    <div class="side-panel col-left">
      <img class="side-img" src="side-image.jpg" alt="صورة المهرجان"
        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22560%22%3E%3Crect width=%22400%22 height=%22560%22 rx=%2220%22 fill=%22%23f6f0ff%22 stroke=%22%231f1235%22 stroke-width=%223%22 stroke-dasharray=%228 6%22/%3E%3Ctext x=%22200%22 y=%22280%22 text-anchor=%22middle%22 fill=%22%237b3fe4%22 font-family=%22Tajawal%22 font-size=%2218%22%3Eصورة المهرجان%3C/text%3E%3C/svg%3E'">
      <img class="side-img" src="extra-photo.jpg" alt="صورة إضافية"
        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect width=%22400%22 height=%22300%22 rx=%2220%22 fill=%22%23f6f0ff%22 stroke=%22%231f1235%22 stroke-width=%223%22 stroke-dasharray=%228 6%22/%3E%3Ctext x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%23ff3d8e%22 font-family=%22Tajawal%22 font-size=%2218%22%3Eصورة إضافية%3C/text%3E%3C/svg%3E'">
    </div>

  </div>

</div>

<footer>✝ خدمة فتيان اعدادي — 2026 ✝</footer>

<script>
/* ── Confetti particles ── */
const pLayer = document.getElementById('particles');
const colors = ['#ff3d8e','#ffd400','#00d9a3','#2fc6ff','#ff8a3d','#7b3fe4'];
for(let i = 0; i < 40; i++){
  const d = document.createElement('div');
  d.className = 'dot ' + (Math.random() > 0.5 ? 'sq' : 'ci');
  const sz = Math.random() * 6 + 4;
  d.style.cssText = `
    width:${sz}px; height:${sz}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    animation-duration:${Math.random()*18+10}s;
    animation-delay:${Math.random()*12}s;
  `;
  pLayer.appendChild(d);
}

/* ── Toggle collapsible ── */
function toggleSection(btn, panelId){
  const body = document.getElementById(panelId);
  const isOpen = body.classList.toggle('is-open');
  btn.classList.toggle('is-open', isOpen);
  btn.setAttribute('aria-expanded', isOpen);
}

/* ── CSV helpers ── */
function parseCsvRow(row){
  const cells = []; let cur = '', inQ = false;
  for(let i = 0; i < row.length; i++){
    const ch = row[i];
    if(ch === '"'){ if(inQ && row[i+1]==='"'){ cur+='"'; i++; } else inQ=!inQ; }
    else if(ch===',' && !inQ){ cells.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  cells.push(cur.trim()); return cells;
}
function parseCsv(txt){
  return txt.split(/\r?\n/).filter(r=>r.trim()).slice(1).map(parseCsvRow);
}

/* ── Proxy URL (Apps Script) ── */
/* استبدل الرابط ده برابط الـ Web App بتاعك بعد الـ Deploy */
const PROXY_URL = "https://script.google.com/macros/s/AKfycbyZNIVDBRF_wnHXYTjFnad4Zmm64k7f9l616H7UBNSnuO5dxQFkGNTdj11FmcYuV-ljQw/exec";
const sheetURL  = PROXY_URL + "?type=top10";
const groupsURL = PROXY_URL + "?type=groups";
const tasksURL  = PROXY_URL + "?type=tasks";

/* ── Rank visuals ── */
function rankVis(rank){
  const r = parseInt(rank,10);
  if(r===1) return { icon:'🥇', bg:'#ffd400', shadow:'', glow:'rgba(255,212,0,0.28)' };
  if(r===2) return { icon:'🥈', bg:'#d7d7e0', shadow:'', glow:'rgba(215,215,224,0.28)' };
  if(r===3) return { icon:'🥉', bg:'#ff8a3d', shadow:'', glow:'rgba(255,138,61,0.28)' };
  return { icon:'🎓', bg:'#2fc6ff', shadow:'', glow:'rgba(47,198,255,0.28)' };
}

/* ── Search ── */
async function searchStudent(){
  const code = document.getElementById('codeInput').value.trim();
  const res = document.getElementById('result');
  if(!code){ res.innerHTML='<div class="msg">اكتب الكود الخاص بك أولاً 👆</div>'; return; }
  res.innerHTML = '<div class="spinner"></div>';
  try{
    const r = await fetch(PROXY_URL + "?type=student&code=" + encodeURIComponent(code));
    const s = await r.json();
    if(s.found){
      const v = rankVis(s.rank);
      res.innerHTML = `
        <div class="result-card" style="--rc-glow:${v.glow};">
          <div class="result-rank-badge" style="background:${v.bg};">${v.icon}</div>
          <div class="result-name">${s.name}</div>
          <div class="result-score-big">
            <div class="label">إجمالي السكور</div>
            <div class="value">${s.score}</div>
          </div>
          <div class="result-stats">
            <div class="result-stat"><div class="s-label">الفصل</div><div class="s-value">${s.class}</div></div>
            <div class="result-stat"><div class="s-label">المجموعة</div><div class="s-value">${s.group}</div></div>
            <div class="result-stat"><div class="s-label">الترتيب</div><div class="s-value">${s.rank}</div></div>
          </div>
        </div>`;
    } else {
      res.innerHTML = '<div class="msg error">❌ مش لاقي الكود ده، تأكد من الأرقام وحاول تاني</div>';
    }
  } catch(e){
    res.innerHTML = '<div class="msg error">⚠️ في مشكلة في الاتصال، حاول بعد شوية</div>';
  }
}

/* ── TOP 10 ── */
async function loadTop10(){
  const el = document.getElementById('topTenList');
  try{
    const r = await fetch(sheetURL);
    const rows = parseCsv(await r.text())
      .filter(s=>s[0]&&s[0].trim());
    // السيرفر بيرجع أعلى 10 بالفعل بعد الترتيب، فمفيش داعي نرتب أو نقطع تاني هنا
    if(!rows.length){ el.innerHTML='<div class="msg">لا توجد بيانات</div>'; return; }
    el.innerHTML = rows.map((s,i)=>{
      const p = i+1;
      const pc = p<=3?`p${p}`:'';
      return `<div class="lb-row ${pc}" style="animation-delay:${i*0.05}s">
        <div class="lb-num">${p}</div>
        <div class="lb-name">${s[0]}</div>
        <div class="lb-score">${s[1]}</div>
      </div>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="msg error">تعذر التحميل</div>';
  }
}

/* ── Groups ── */
async function loadGroups(){
  const el = document.getElementById('groupsList');
  try{
    const r = await fetch(groupsURL);
    const txt = await r.text();
    const rows = txt.split(/\r?\n/).filter(r=>r.trim()).slice(1).map(parseCsvRow)
      .filter(r=>r[0]&&r[0].trim())
      .sort((a,b)=>(parseFloat(b[1])||0)-(parseFloat(a[1])||0));
    if(!rows.length){ el.innerHTML='<div class="msg">لا توجد بيانات</div>'; return; }
    el.innerHTML = rows.map((g,i)=>{
      const p = i+1;
      const pc = p<=3?`p${p}`:'';
      return `<div class="lb-row ${pc}" style="animation-delay:${i*0.05}s">
        <div class="lb-num">${p}</div>
        <div class="lb-name">${g[0]}</div>
        <div class="lb-score">${g[1]}</div>
      </div>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="msg error">تعذر التحميل</div>';
  }
}

/* ── Tasks ── */
async function loadTasks(){
  const el = document.getElementById('tasksList');
  try{
    const r = await fetch(tasksURL);
    const txt = await r.text();
    const tasks = txt.split(/\r?\n/).filter(r=>r.trim()).slice(1).map(parseCsvRow)
      .filter(r=>r[0]&&r[0].trim()).slice(0,3);
    if(!tasks.length){ el.innerHTML='<div class="msg">لا توجد مهام</div>'; return; }
    el.innerHTML = tasks.map((t,i)=>{
      const n=t[0]||'', lk=t[1]||'';
      return lk
        ? `<a class="task-item" href="${lk}" target="_blank" rel="noopener" style="animation-delay:${i*0.07}s">• ${n}</a>`
        : `<div class="task-item no-link" style="animation-delay:${i*0.07}s">• ${n}</div>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="msg error">تعذر التحميل</div>';
  }
}

loadTop10();
loadGroups();
loadTasks();
</script>
